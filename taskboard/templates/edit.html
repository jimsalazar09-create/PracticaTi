{% extends "base.html" %}
{% block contenido %}

<div class="form-container">
  <h2>Editar tarea</h2>
  <form method="POST" action="/editar/{{ tarea.id }}">

    <label>Título *</label>
    <input type="text" name="titulo" required value="{{ tarea.titulo }}">

    <label>Descripción</label>
    <textarea name="descripcion" rows="3">{{ tarea.descripcion }}</textarea>

    <label>Prioridad</label>
    <select name="prioridad">
      <option value="baja"  {% if tarea.prioridad == "baja"  %}selected{% endif %}>Baja</option>
      <option value="media" {% if tarea.prioridad == "media" %}selected{% endif %}>Media</option>
      <option value="alta"  {% if tarea.prioridad == "alta"  %}selected{% endif %}>Alta</option>
    </select>

    <label>Asignado a</label>
    <input type="text" name="asignado_a" value="{{ tarea.asignado_a }}">

    <div class="form-actions">
      <a href="/">Cancelar</a>
      <button type="submit">Guardar cambios</button>
    </div>

  </form>
</div>

{% endblock %}
