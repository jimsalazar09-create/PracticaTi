{% extends "base.html" %}
{% block contenido %}

<div class="form-container">
  <h2>Nueva tarea</h2>
  <form method="POST" action="/crear">

    <label>Título *</label>
    <input type="text" name="titulo" required placeholder="Ej: Crear login de usuarios">

    <label>Descripción</label>
    <textarea name="descripcion" rows="3" placeholder="Describe la tarea..."></textarea>

    <label>Prioridad</label>
    <select name="prioridad">
      <option value="baja">Baja</option>
      <option value="media" selected>Media</option>
      <option value="alta">Alta</option>
    </select>

    <label>Asignado a</label>
    <input type="text" name="asignado_a" placeholder="Nombre del responsable">

    <div class="form-actions">
      <a href="/">Cancelar</a>
      <button type="submit">Crear tarea</button>
    </div>

  </form>
</div>

{% endblock %}
